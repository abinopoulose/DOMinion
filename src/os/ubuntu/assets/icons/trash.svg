<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="trash-body" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F2F2F2" />
      <stop offset="100%" stop-color="#D4D4D4" />
    </linearGradient>
    <linearGradient id="trash-lid" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E8E8E8" />
      <stop offset="100%" stop-color="#CCCCCC" />
    </linearGradient>
    <linearGradient id="trash-shadow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(0,0,0,0.15)" />
      <stop offset="100%" stop-color="rgba(0,0,0,0.3)" />
    </linearGradient>
  </defs>

  <!-- Shadow -->
  <path fill="url(#trash-shadow)" d="M 12 18 L 52 18 L 48 58 C 48 60 46 62 44 62 L 20 62 C 18 62 16 60 16 58 Z" transform="translate(0, 2)" />
  
  <!-- Body -->
  <path fill="url(#trash-body)" d="M 14 18 L 50 18 L 46 58 C 46 60 44 62 42 62 L 22 62 C 20 62 18 60 18 58 Z" />
  
  <!-- Vertical lines on body -->
  <rect x="22" y="24" width="2" height="32" rx="1" fill="#BBBBBB" />
  <rect x="31" y="24" width="2" height="32" rx="1" fill="#BBBBBB" />
  <rect x="40" y="24" width="2" height="32" rx="1" fill="#BBBBBB" />

  <!-- Lid Shadow -->
  <rect x="8" y="15" width="48" height="6" rx="3" fill="rgba(0,0,0,0.15)" transform="translate(0, 1)" />

  <!-- Lid -->
  <rect x="10" y="14" width="44" height="6" rx="3" fill="url(#trash-lid)" />
  
  <!-- Lid handle -->
  <path fill="url(#trash-lid)" d="M 26 14 L 26 10 C 26 8 28 8 30 8 L 34 8 C 36 8 38 8 38 10 L 38 14 Z" />
  <path fill="none" stroke="#BBBBBB" stroke-width="2" d="M 28 14 L 28 10 L 36 10 L 36 14" />
</svg>
